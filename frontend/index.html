<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Footprint Calculator</title>
  <link rel="stylesheet" href="/frontend/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="bg-scene">
    <svg width="100%" height="100%" viewBox="0 0 680 620" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a6e8a"/>
          <stop offset="40%" stop-color="#5d8aaa"/>
          <stop offset="75%" stop-color="#3d6070"/>
          <stop offset="100%" stop-color="#1a2e20"/>
        </linearGradient>
        <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a3020"/>
          <stop offset="100%" stop-color="#0d1a0f"/>
        </linearGradient>
        <linearGradient id="redglow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c03020" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#c03020" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <rect width="680" height="620" fill="url(#sky)"/>
      <circle cx="90" cy="90" r="1.5" fill="#d8d0c0" opacity="0.5"/>
      <circle cx="210" cy="60" r="1" fill="#d8d0c0" opacity="0.4"/>
      <circle cx="340" cy="40" r="2" fill="#d8d0c0" opacity="0.5"/>
      <circle cx="470" cy="75" r="1.5" fill="#d8d0c0" opacity="0.45"/>
      <circle cx="580" cy="55" r="1" fill="#d8d0c0" opacity="0.5"/>
      <circle cx="630" cy="110" r="2" fill="#d8d0c0" opacity="0.4"/>
      <rect x="0" y="410" width="680" height="210" fill="url(#ground)"/>
      <ellipse cx="340" cy="415" rx="310" ry="25" fill="url(#redglow)"/>
      <rect x="73" y="350" width="14" height="200" fill="#1a2a18"/>
      <ellipse cx="80" cy="270" rx="55" ry="90" fill="#1e3d22"/>
      <ellipse cx="55" cy="310" rx="35" ry="65" fill="#1e3d22"/>
      <ellipse cx="105" cy="310" rx="35" ry="65" fill="#1e3d22"/>
      <ellipse cx="80" cy="240" rx="40" ry="70" fill="#243f28"/>
      <rect x="593" y="330" width="16" height="220" fill="#1a2a18"/>
      <ellipse cx="601" cy="240" rx="62" ry="100" fill="#1e3d22"/>
      <ellipse cx="572" cy="285" rx="40" ry="72" fill="#1e3d22"/>
      <ellipse cx="630" cy="285" rx="40" ry="72" fill="#1e3d22"/>
      <ellipse cx="601" cy="210" rx="45" ry="78" fill="#243f28"/>
      <rect x="18" y="380" width="10" height="180" fill="#1a2a18" opacity="0.85"/>
      <ellipse cx="23" cy="320" rx="38" ry="65" fill="#1a3820" opacity="0.85"/>
      <rect x="652" y="370" width="10" height="190" fill="#1a2a18" opacity="0.85"/>
      <ellipse cx="657" cy="310" rx="38" ry="65" fill="#1a3820" opacity="0.85"/>
      <rect x="155" y="390" width="8" height="170" fill="#1a2a18" opacity="0.6"/>
      <ellipse cx="159" cy="340" rx="30" ry="55" fill="#1a3820" opacity="0.6"/>
      <rect x="517" y="385" width="8" height="175" fill="#1a2a18" opacity="0.6"/>
      <ellipse cx="521" cy="335" rx="30" ry="55" fill="#1a3820" opacity="0.6"/>
    </svg>
  </div>

  <div class="page-center">
    <div class="form-card">
      <div class="form-header">
        <h1>🌿 Carbon Footprint</h1>
        <p>Hitung jejak karbon rumah tangga kamu</p>
      </div>

      <div class="field">
        <input type="text" id="nama" placeholder="Nama kamu"/>
        <i class="ti ti-user"></i>
      </div>
      <div class="field">
        <input type="number" id="listrik" placeholder="Pemakaian listrik"/>
        <span class="unit">kWh</span>
      </div>
      <div class="field">
        <input type="number" id="air" placeholder="Pemakaian air"/>
        <span class="unit">Liter</span>
      </div>
      <div class="field">
        <input type="number" id="transportasi" placeholder="Total perjalanan"/>
        <span class="unit">km</span>
      </div>
      <div class="field">
        <input type="number" id="sampah" placeholder="Sampah makanan"/>
        <span class="unit">kg</span>
      </div>

      <button class="btn-hitung" onclick="hitungCarbon()">
        Hitung Carbon Footprint
      </button>
    </div>
  </div>

  <script src="/frontend/script.js"></script>
</body>
</html>
